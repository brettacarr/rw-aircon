spring:
  datasource:
    url: jdbc:sqlite::memory:
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false
  sql:
    init:
      mode: always

myair:
  api:
    base-url: http://localhost:9999
    timeout-ms: 1000
    retry-delay-ms: 100

logging:
  level:
    com.rw.aircon: DEBUG
